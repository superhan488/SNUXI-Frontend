name: sync-upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main from upstream
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/superhan488/SNUXI-Frontend.git || true
          git fetch upstream main
          git checkout main
          git merge --no-edit upstream/main || {
            echo "Merge conflict while syncing upstream/main"
            exit 1
          }
          git push origin main
